name: Deploy Hostinger

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    name: Pull deploy branch on Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key
          ssh-keyscan -p "${{ secrets.HOSTINGER_SSH_PORT }}" "${{ secrets.HOSTINGER_SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on Hostinger
        shell: bash
        run: |
          set -euo pipefail
          echo "Starting deploy on Hostinger..."
          ssh \
            -i ~/.ssh/hostinger_deploy_key \
            -p "${{ secrets.HOSTINGER_SSH_PORT }}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}" \
            'cd /home/u754689460/domains/mapapsique.orbisconect.com/public_html && git pull origin deploy'
          echo "Deploy completed."
